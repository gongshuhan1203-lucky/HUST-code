<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>登录</title>
    <link rel="stylesheet" href="./css/reset.css">
    <style>
        body,
        html {
            width: 100%;
            height: 100%;
            background: linear-gradient(white, #105fa5);
        }
        .nav {
            width: 100%;
            height: 80px;
            background-color: #105fa5;
        }
        .logo img {
            margin-left: 10px;
            height: 80px;
        }
        .content {
            width: 600px;
            height: 400px;
            background-color:aliceblue;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 100px auto;
            border-radius: 20px;
            transition: all .3s;
            box-shadow: 10px 10px 10px rgba(0, 0, 0, 0.307);
        }
        .content:hover {
            transform: translateY(-5px);
        }
        .login {
            width: 400px;
            font-size: 25px;
        }
        label {
            font-size: 20px;
        }
        input {
            width: 100%;
            height: 40px;
            border-radius: 10px;
            background-color: white;
            margin: 15px 0;
            font-size: 20px;
            border: 2px solid rgba(128, 128, 128, 0.296);
            transition: all .3s;
        }
        input::placeholder {
            padding: 5px;
        }
        input:focus {
            border-color: #105fa5;
        }
        input[type='button']:hover {
            background-color: #105fa5;
            color: aliceblue;
        }
        .register {
            margin-top: 15px;
            font-size: 15px;
        }
        .register a {
            color: #105fa5;
        }
    </style>
</head>
<body>
    <div class="nav">
        <div class="logo"><img src="./images/logo.png" alt=""></div>
    </div>
    <div class="content">
        <div class="login">
            <label for="">账号：</label>
            <input id="name" type="text" placeholder="请输入账号" required><br>
            <label for="pwd">密码：</label>
            <input id="pwd" type="password" placeholder="请输入密码" required><br>
            <div><input id="btn" type="button" value="登录"></div>
            <div class="register">
                <a href="./register.html">注册</a>
            </div>
        </div>
    </div>
</body>
<script src="./js/login.js"></script>
</html>
